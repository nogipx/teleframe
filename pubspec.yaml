name: teleframe
description: Telegram bot framework with screen-based navigation.
version: 1.0.0

topics:
  - telegram
  - bot
  - framework

environment:
  sdk: ^3.11.0

dependencies:
  televerse: ^3.3.0
  get_it: ^9.2.1
  sembast: ^3.8.6
  path: ^1.9.1
  crypto: ^3.0.7
  http: ^1.6.0
  args: ^2.7.0
  # Used directly to configure an HTTP proxy for the Telegram API client
  # (televerse's transport is Dio-based). See service_locator.dart.
  dio: ^5.9.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
